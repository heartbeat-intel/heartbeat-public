name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Build and Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        env:
          PUBLIC_EXCHANGE_API_URL: ${{ github.ref_name == 'staging' && 'https://exchange-api-staging-598945484330.us-central1.run.app' || 'https://exchange-api-production-598945484330.us-central1.run.app' }}
          PUBLIC_API_BASE_URL: ${{ github.ref_name == 'staging' && 'heartbeat-staging.com' || 'heartbeatintel.com' }}
          PUBLIC_TENANT_BASE_DOMAIN: ${{ github.ref_name == 'staging' && 'heartbeat-staging.com' || 'heartbeatintel.com' }}
          PUBLIC_TENANT_PROTOCOL: https
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: heartbeat-public
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
